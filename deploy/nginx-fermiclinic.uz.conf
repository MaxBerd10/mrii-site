# MRII — fermiclinic.uz (Nginx + Let's Encrypt)
# Sayt: /home/mrii-site/dist
# API/Admin/Static: Docker → 127.0.0.1:8001

upstream mrii_django {
    server 127.0.0.1:8001;
    keepalive 8;
}

# www → apex (HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name www.fermiclinic.uz;
    return 301 https://fermiclinic.uz$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.fermiclinic.uz;

    ssl_certificate /etc/letsencrypt/live/fermiclinic.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fermiclinic.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://fermiclinic.uz$request_uri;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name fermiclinic.uz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://fermiclinic.uz$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fermiclinic.uz;

    ssl_certificate /etc/letsencrypt/live/fermiclinic.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fermiclinic.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 32m;

    # Django admin CSS/JS (WhiteNoise)
    location ^~ /static/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /admin/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /media/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    root /home/mrii-site/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }
}
