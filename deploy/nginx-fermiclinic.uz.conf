# MRII — fermiclinic.uz (Nginx)
# Sayt: /home/mrii-site/dist
# API/Admin: Docker Compose → 127.0.0.1:8001

upstream mrii_django {
    server 127.0.0.1:8001;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name www.fermiclinic.uz;
    return 301 http://fermiclinic.uz$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name fermiclinic.uz;

    # Certbot HTTP-01 (SSL o‘rnatilganda o‘zi yangilaydi)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    client_max_body_size 32m;

    # Django CMS + API + media
    location /admin/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /api/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /media/ {
        proxy_pass http://mrii_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # React (Vite) SPA
    root /home/mrii-site/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
