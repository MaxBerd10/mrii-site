services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mrii
      POSTGRES_USER: mrii
      POSTGRES_PASSWORD: mrii
    volumes:
      - mrii_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrii -d mrii"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      POSTGRES_DB: mrii
      POSTGRES_USER: mrii
      POSTGRES_PASSWORD: mrii
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8443,http://127.0.0.1:8443}
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:8443}
      MEDIA_URL: /media/
    volumes:
      - mrii_media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  mrii_pgdata:
  mrii_media:
