<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Davolash, fan, ta'lim va AI-texnologiyalar — Medical Research & Innovation Institute (MRII)"
    />
    <title>MRII — Innovatsion tibbiyot instituti</title>
    <script>
      // Prevent native hash scroll on load (it fights our custom jump → bounce).
      (function () {
        if (!location.hash || location.hash === '#') return
        document.documentElement.classList.add('no-smooth-scroll')
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual'
        try {
          sessionStorage.setItem('mrii-hash', location.hash)
        } catch (_) {}
        history.replaceState(null, '', location.pathname + location.search)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
